  <rect x="200" y="30" width="240" height="360" rx="34" fill="#050b14" stroke="#8ca8d0" stroke-opacity=".35" stroke-width="3"/><rect x="214" y="48" width="212" height="324" rx="24" fill="#0d1b2e"/><rect x="280" y="38" width="80" height="8" rx="4" fill="#273a55"/>
