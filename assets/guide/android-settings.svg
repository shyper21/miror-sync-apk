<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Buka Pengaturan Android</title><desc id="desc">Ilustrasi ponsel Android dengan daftar menu Pengaturan.</desc>
