<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Izinkan USB Debugging</title><desc id="desc">Ilustrasi popup Allow USB debugging dengan Always allow dicentang.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#17213a"/><stop offset="1" stop-color="#07111f"/></linearGradient></defs>
  <rect width="640" height="420" rx="32" fill="url(#bg)"/><rect x="204" y="28" width="232" height="364" rx="34" fill="#050b14" stroke="#8ca8d0" stroke-opacity=".3" stroke-width="3"/><rect x="217" y="46" width="206" height="328" rx="24" fill="#111b28"/><rect x="230" y="98" width="180" height="230" rx="22" fill="#f6f8fb"/>
  <g font-family="Segoe UI,Arial"><circle cx="320" cy="130" r="23" fill="#5b7cff"/><path d="M310 130h20m-10-10v20" stroke="#fff" stroke-width="3" stroke-linecap="round"/><text x="320" y="174" text-anchor="middle" fill="#101827" font-size="17" font-weight="800">Allow USB debugging?</text><text x="320" y="198" text-anchor="middle" fill="#5f6b7d" font-size="10">Computer RSA key fingerprint</text><rect x="248" y="218" width="16" height="16" rx="4" fill="#2f72ff"/><path d="m252 226 4 4 7-8" fill="none" stroke="#fff" stroke-width="2"/><text x="270" y="230" fill="#344054" font-size="10">Always allow from this computer</text><text x="274" y="292" fill="#667085" font-size="12" font-weight="700">CANCEL</text><rect x="325" y="264" width="70" height="40" rx="12" fill="#2f72ff"/><text x="360" y="289" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">ALLOW</text></g>
</svg>
