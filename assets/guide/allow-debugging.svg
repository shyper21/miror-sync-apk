<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Allow USB debugging</title><desc id="desc">Dialog izin USB debugging dengan Always allow dicentang.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#112941"/><stop offset="1" stop-color="#091523"/></linearGradient></defs><rect width="800" height="500" rx="34" fill="url(#bg)"/>
  <rect x="155" y="74" width="490" height="352" rx="25" fill="#f5f9ff"/><text x="198" y="130" fill="#13233a" font-family="Segoe UI,Arial" font-size="24" font-weight="700">Allow USB debugging?</text><text x="198" y="169" fill="#607087" font-family="Segoe UI,Arial" font-size="14">The computer's RSA key fingerprint is:</text><rect x="198" y="191" width="404" height="53" rx="10" fill="#e7edf5"/><text x="218" y="222" fill="#53667d" font-family="Consolas,monospace" font-size="12">84:2A:1C:...:D7:91</text>
  <rect x="198" y="281" width="24" height="24" rx="5" fill="#31dfd1"/><path d="m204 293 5 5 9-11" fill="none" stroke="#071321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="235" y="299" fill="#243951" font-family="Segoe UI,Arial" font-size="14">Always allow from this computer</text>
  <text x="409" y="376" fill="#6682ff" font-family="Segoe UI,Arial" font-size="14" font-weight="700">Cancel</text><rect x="498" y="344" width="105" height="48" rx="12" fill="#31dfd1"/><text x="531" y="375" fill="#071321" font-family="Segoe UI,Arial" font-size="14" font-weight="800">Allow</text>
</svg>
