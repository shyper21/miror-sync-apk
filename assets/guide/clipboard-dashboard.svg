<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Copy HP ke Komputer</title><desc id="desc">Toggle clipboard, status OFF dan ON, tombol ambil dan clear, peringatan keamanan, serta status berhasil.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#102b46"/><stop offset="1" stop-color="#081421"/></linearGradient><linearGradient id="a" x2="1"><stop stop-color="#31dfd1"/><stop offset="1" stop-color="#6682ff"/></linearGradient></defs>
  <rect width="800" height="500" rx="34" fill="url(#bg)"/><circle cx="700" cy="58" r="120" fill="#6682ff" opacity=".08"/>
  <rect x="65" y="46" width="670" height="408" rx="28" fill="#091727" stroke="#b6d8ff" stroke-opacity=".2"/>
  <text x="105" y="100" fill="#f5f9ff" font-family="Segoe UI,Arial" font-size="23" font-weight="700">Clipboard Android</text><text x="105" y="130" fill="#9fb1c8" font-family="Segoe UI,Arial" font-size="12">Kontrol dari dashboard mirroring</text>
  <rect x="105" y="158" width="590" height="78" rx="16" fill="#10243a" stroke="#31dfd1" stroke-opacity=".18"/><text x="130" y="190" fill="#f5f9ff" font-family="Segoe UI,Arial" font-size="16" font-weight="700">Copy HP &#8594; Komputer</text><text x="130" y="215" fill="#9fb1c8" font-family="Segoe UI,Arial" font-size="11">Auto Sync hanya saat CONNECTED</text>
  <rect x="568" y="178" width="102" height="40" rx="20" fill="#24384d"/><circle cx="590" cy="198" r="15" fill="#a8b8ca"/><text x="520" y="203" fill="#9fb1c8" font-family="Segoe UI,Arial" font-size="11" font-weight="800">OFF</text><text x="623" y="203" fill="#6f849c" font-family="Segoe UI,Arial" font-size="10" font-weight="800">ON</text>
  <rect x="105" y="259" width="282" height="54" rx="12" fill="url(#a)"/><text x="175" y="292" fill="#071321" font-family="Segoe UI,Arial" font-size="14" font-weight="800">Ambil Clipboard HP</text><rect x="405" y="259" width="290" height="54" rx="12" fill="#192e46" stroke="#b6d8ff" stroke-opacity=".2"/><text x="474" y="292" fill="#cbd7e7" font-family="Segoe UI,Arial" font-size="14" font-weight="700">Clear Clipboard Lokal</text>
  <rect x="105" y="337" width="590" height="43" rx="11" fill="#62e6a5" opacity=".1" stroke="#62e6a5" stroke-opacity=".28"/><circle cx="128" cy="359" r="6" fill="#62e6a5"/><text x="145" y="364" fill="#9bf4c6" font-family="Segoe UI,Arial" font-size="12" font-weight="700">Clipboard berhasil disalin (12 karakter)</text>
  <rect x="105" y="394" width="590" height="37" rx="10" fill="#ffd47f" opacity=".08" stroke="#ffd47f" stroke-opacity=".2"/><path d="M125 404v10m0 6h.01" stroke="#ffd47f" stroke-width="3" stroke-linecap="round"/><text x="144" y="418" fill="#ffe0a0" font-family="Segoe UI,Arial" font-size="11" font-weight="700">Aktifkan hanya saat dibutuhkan</text>
