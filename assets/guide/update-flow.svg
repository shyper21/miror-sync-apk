<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Alur update MirrorSync</title><desc id="desc">Check Update, download, install, lalu buka ulang.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#102b46"/><stop offset="1" stop-color="#081421"/></linearGradient><linearGradient id="a" x2="1"><stop stop-color="#31dfd1"/><stop offset="1" stop-color="#6682ff"/></linearGradient></defs><rect width="800" height="500" rx="34" fill="url(#bg)"/>
  <path d="M142 248h515" stroke="#314d68" stroke-width="4" stroke-linecap="round"/><g font-family="Segoe UI,Arial" text-anchor="middle"><circle cx="145" cy="248" r="58" fill="#10283e" stroke="#31dfd1" stroke-opacity=".4" stroke-width="2"/><text x="145" y="240" fill="#31dfd1" font-size="24" font-weight="800">01</text><text x="145" y="270" fill="#f5f9ff" font-size="13" font-weight="700">Check Update</text><circle cx="315" cy="248" r="58" fill="#10283e" stroke="#31dfd1" stroke-opacity=".4" stroke-width="2"/><text x="315" y="240" fill="#31dfd1" font-size="24" font-weight="800">02</text><text x="315" y="270" fill="#f5f9ff" font-size="13" font-weight="700">Download</text><circle cx="485" cy="248" r="58" fill="#10283e" stroke="#31dfd1" stroke-opacity=".4" stroke-width="2"/><text x="485" y="240" fill="#31dfd1" font-size="24" font-weight="800">03</text><text x="485" y="270" fill="#f5f9ff" font-size="13" font-weight="700">Install</text><circle cx="655" cy="248" r="66" fill="url(#a)"/><text x="655" y="240" fill="#071321" font-size="24" font-weight="900">04</text><text x="655" y="270" fill="#071321" font-size="13" font-weight="800">Buka kembali</text></g><text x="400" y="102" fill="#f5f9ff" font-family="Segoe UI,Arial" font-size="25" font-weight="700" text-anchor="middle">Update tanpa uninstall manual</text><text x="400" y="391" fill="#9fb1c8" font-family="Segoe UI,Arial" font-size="13" text-anchor="middle">Buka ulang MirrorSync dari shortcut Desktop setelah instalasi selesai.</text>
