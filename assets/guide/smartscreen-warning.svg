<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Windows SmartScreen</title><desc id="desc">Peringatan SmartScreen dengan More info dan Run anyway.</desc>
  <rect width="800" height="500" rx="34" fill="#0b6bb8"/><path d="m400 75 98 38v92c0 72-39 132-98 160-59-28-98-88-98-160v-92z" fill="#fff" opacity=".12"/><path d="m400 102 70 27v73c0 52-27 98-70 123-43-25-70-71-70-123v-73z" fill="none" stroke="#fff" stroke-opacity=".75" stroke-width="6"/>
  <text x="98" y="104" fill="#fff" font-family="Segoe UI,Arial" font-size="28" font-weight="700">Windows protected your PC</text><text x="98" y="161" fill="#e6f4ff" font-family="Segoe UI,Arial" font-size="15">Microsoft Defender SmartScreen prevented an</text><text x="98" y="185" fill="#e6f4ff" font-family="Segoe UI,Arial" font-size="15">unrecognized app from starting.</text>
  <text x="98" y="252" fill="#fff" font-family="Segoe UI,Arial" font-size="15" text-decoration="underline">More info</text><rect x="98" y="325" width="153" height="51" rx="6" fill="#fff"/><text x="125" y="357" fill="#075a99" font-family="Segoe UI,Arial" font-size="14" font-weight="700">Run anyway</text><rect x="270" y="325" width="110" height="51" rx="6" fill="none" stroke="#fff" stroke-width="2"/><text x="303" y="357" fill="#fff" font-family="Segoe UI,Arial" font-size="14">Don't run</text><text x="98" y="423" fill="#d8efff" font-family="Segoe UI,Arial" font-size="12">Pastikan sumber GitHub Release dan SHA-256 cocok.</text>
</svg>
