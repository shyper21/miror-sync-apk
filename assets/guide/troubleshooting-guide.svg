<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Peta troubleshooting MirrorSync</title><desc id="desc">Alur dari gejala USB, Wireless, keyboard, dan mirror ke solusi singkat.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#102b46"/><stop offset="1" stop-color="#081421"/></linearGradient><linearGradient id="a" x2="1"><stop stop-color="#31dfd1"/><stop offset="1" stop-color="#6682ff"/></linearGradient></defs>
  <rect width="800" height="500" rx="34" fill="url(#bg)"/><text x="55" y="68" fill="#f5f9ff" font-family="Segoe UI,Arial" font-size="25" font-weight="700">Mulai dari gejala</text><text x="55" y="94" fill="#9fb1c8" font-family="Segoe UI,Arial" font-size="12">Pilih masalah yang terlihat, lalu ikuti solusi terpendek.</text>
  <g font-family="Segoe UI,Arial"><rect x="55" y="132" width="205" height="92" rx="17" fill="#10243a" stroke="#b6d8ff" stroke-opacity=".16"/><circle cx="89" cy="166" r="17" fill="#31dfd1" opacity=".14"/><text x="80" y="171" fill="#31dfd1" font-size="10" font-weight="800">USB</text><text x="118" y="165" fill="#f5f9ff" font-size="14" font-weight="700">Hanya charging</text><text x="118" y="187" fill="#9fb1c8" font-size="10">Pilih File Transfer</text><text x="118" y="204" fill="#9fb1c8" font-size="10">dan gunakan kabel data</text>
  <rect x="298" y="132" width="205" height="92" rx="17" fill="#10243a" stroke="#b6d8ff" stroke-opacity=".16"/><circle cx="332" cy="166" r="17" fill="#6682ff" opacity=".16"/><text x="322" y="171" fill="#9eafff" font-size="9" font-weight="800">WIFI</text><text x="361" y="165" fill="#f5f9ff" font-size="14" font-weight="700">Status offline</text><text x="361" y="187" fill="#9fb1c8" font-size="10">Aktifkan debugging</text><text x="361" y="204" fill="#9fb1c8" font-size="10">dan Connect ulang</text>
  <rect x="540" y="132" width="205" height="92" rx="17" fill="#10243a" stroke="#b6d8ff" stroke-opacity=".16"/><circle cx="574" cy="166" r="17" fill="#31dfd1" opacity=".14"/><text x="563" y="171" fill="#31dfd1" font-size="9" font-weight="800">KEY</text><text x="603" y="165" fill="#f5f9ff" font-size="14" font-weight="700">Keyboard diam</text><text x="603" y="187" fill="#9fb1c8" font-size="10">Klik Focus Mirror</text><text x="603" y="204" fill="#9fb1c8" font-size="10">lalu coba UHID</text></g>
  <path d="M157 244v38m243-38v38m243-38v38M157 282h486" fill="none" stroke="#31dfd1" stroke-opacity=".5" stroke-width="3" stroke-linecap="round"/>
  <rect x="126" y="302" width="548" height="117" rx="22" fill="url(#a)" opacity=".13" stroke="#31dfd1" stroke-opacity=".45" stroke-width="2"/><text x="161" y="343" fill="#bffbf4" font-family="Segoe UI,Arial" font-size="12" font-weight="800">URUTAN AMAN</text><text x="161" y="380" fill="#f5f9ff" font-family="Segoe UI,Arial" font-size="18" font-weight="700">Unlock HP  &#8594;  cek kabel/WiFi  &#8594;  cek izin</text><text x="161" y="408" fill="#cbd7e7" font-family="Segoe UI,Arial" font-size="15">Refresh Devices  &#8594;  Retry Connection</text><circle cx="622" cy="361" r="28" fill="#31dfd1" opacity=".18"/><path d="M611 361l8 8 16-18" fill="none" stroke="#31dfd1" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
